# F006 Dataset Specific Mappings
# This file defines the mappings specific to the F006 nerve dataset
# Aligned with quantdb/ingest.py logic for path metadata and CSV ingestion

# Dataset configuration
dataset:
  uuid: '2a3d01c0-39d3-464a-8746-54c9d67ebe0f'
  name: 'F006 Pig Nerve Dataset'
  metadata_urls:
    curation_export: 'https://cassava.ucsd.edu/sparc/datasets/{uuid}/LATEST/curation-export.json'
    path_metadata: 'https://cassava.ucsd.edu/sparc/datasets/{uuid}/LATEST/path-metadata.json'

# Dataset-specific aspects
aspects:
  # Fiber classification aspects
  - iri: http://uri.interlex.org/tgbugs/uris/readable/aspect/identifier/instance
    label: identifier-instance
  - iri: http://uri.interlex.org/tgbugs/uris/readable/aspect/position
    label: position
  - iri: http://uri.interlex.org/tgbugs/uris/readable/aspect/centroid
    label: centroid
  - iri: http://uri.interlex.org/tgbugs/uris/readable/aspect/distance-along-axis
    label: distance-along-axis
  - iri: http://uri.interlex.org/tgbugs/uris/readable/aspect/centroid-x
    label: centroid-x
  - iri: http://uri.interlex.org/tgbugs/uris/readable/aspect/centroid-y
    label: centroid-y
  - iri: http://uri.interlex.org/tgbugs/uris/readable/aspect/radius
    label: radius
  - iri: http://uri.interlex.org/tgbugs/uris/readable/aspect/radius/from/parent/centroid
    label: radius-from-parent-centroid
  - iri: http://uri.interlex.org/tgbugs/uris/readable/aspect/perimeter
    label: perimeter
  - iri: http://uri.interlex.org/tgbugs/uris/readable/aspect/area
    label: area
  - iri: http://uri.interlex.org/tgbugs/uris/readable/aspect/angle
    label: angle
  - iri: http://uri.interlex.org/tgbugs/uris/readable/aspect/angle/from/parent/centroid
    label: angle-from-parent-centroid
  - iri: http://uri.interlex.org/tgbugs/uris/readable/aspect/diameter
    label: diameter
    description: Diameter measurement

  # Fiber count aspects
  - iri: http://uri.interlex.org/tgbugs/uris/readable/aspect/count/fiber
    label: count-fiber
  - iri: http://uri.interlex.org/tgbugs/uris/readable/aspect/count/fiber/a
    label: count-fiber-a
  - iri: http://uri.interlex.org/tgbugs/uris/readable/aspect/count/fiber/a/alpha
    label: count-fiber-a-alpha
  - iri: http://uri.interlex.org/tgbugs/uris/readable/aspect/count/fiber/a/beta
    label: count-fiber-a-beta
  - iri: http://uri.interlex.org/tgbugs/uris/readable/aspect/count/fiber/a/gamma
    label: count-fiber-a-gamma
  - iri: http://uri.interlex.org/tgbugs/uris/readable/aspect/count/fiber/a/delta
    label: count-fiber-a-delta
  - iri: http://uri.interlex.org/tgbugs/uris/readable/aspect/count/fiber/b
    label: count-fiber-b
  - iri: http://uri.interlex.org/tgbugs/uris/readable/aspect/count/fiber/c
    label: count-fiber-c
  - iri: http://uri.interlex.org/tgbugs/uris/readable/aspect/count/fiber/myelinated
    label: count-fiber-myelinated
  - iri: http://uri.interlex.org/tgbugs/uris/readable/aspect/count/fiber/unmyelinated
    label: count-fiber-unmyelinated
  - iri: http://uri.interlex.org/tgbugs/uris/readable/aspect/count/fiber/chat
    label: count-fiber-chat
  - iri: http://uri.interlex.org/tgbugs/uris/readable/aspect/count/fiber/nav
    label: count-fiber-nav
  - iri: http://uri.interlex.org/tgbugs/uris/readable/aspect/count/estimated-fiber
    label: count-estimated-fiber

  # Fiber area aspects
  - iri: http://uri.interlex.org/tgbugs/uris/readable/aspect/area/fiber
    label: area-fiber
  - iri: http://uri.interlex.org/tgbugs/uris/readable/aspect/area/fiber/a
    label: area-fiber-a
  - iri: http://uri.interlex.org/tgbugs/uris/readable/aspect/area/fiber/a/alpha
    label: area-fiber-a-alpha
  - iri: http://uri.interlex.org/tgbugs/uris/readable/aspect/area/fiber/a/beta
    label: area-fiber-a-beta
  - iri: http://uri.interlex.org/tgbugs/uris/readable/aspect/area/fiber/a/gamma
    label: area-fiber-a-gamma
  - iri: http://uri.interlex.org/tgbugs/uris/readable/aspect/area/fiber/a/delta
    label: area-fiber-a-delta
  - iri: http://uri.interlex.org/tgbugs/uris/readable/aspect/area/fiber/b
    label: area-fiber-b
  - iri: http://uri.interlex.org/tgbugs/uris/readable/aspect/area/fiber/c
    label: area-fiber-c
  - iri: http://uri.interlex.org/tgbugs/uris/readable/aspect/area/fiber/myelinated
    label: area-fiber-myelinated
  - iri: http://uri.interlex.org/tgbugs/uris/readable/aspect/area/fiber/unmyelinated
    label: area-fiber-unmyelinated
  - iri: http://uri.interlex.org/tgbugs/uris/readable/aspect/area/fiber/chat
    label: area-fiber-chat
  - iri: http://uri.interlex.org/tgbugs/uris/readable/aspect/area/fiber/nav
    label: area-fiber-nav

# Dataset-specific units
units:
  - iri: http://uri.interlex.org/tgbugs/uris/readable/aspect/unit/um2
    label: um2
  - iri: http://uri.interlex.org/tgbugs/uris/readable/aspect/unit/pixel
    label: pixel
  - iri: http://uri.interlex.org/tgbugs/uris/readable/aspect/unit/pixel-9um
    label: pixel-9um
  - iri: http://uri.interlex.org/tgbugs/uris/readable/aspect/unit/pixel-11um
    label: pixel-11um

# F006-specific descriptors
descriptors:
  instance_types:
    # Subject/sample types
    - iri: http://uri.interlex.org/ilx_0101431
      label: human
    - iri: http://uri.interlex.org/tgbugs/uris/readable/nervevolume
      label: nerve-volume
    # Cross-section descriptors
    - iri: http://uri.interlex.org/ilx_0738300
      label: fiber-cross-section
    - iri: http://uri.interlex.org/ilx_0738299
      label: fascicle-cross-section
    - iri: http://uri.interlex.org/ilx_0738298
      label: nerve-cross-section

  quantitative:
    # Fiber measurements
    - label: fiber cross section area um2
      domain: fiber-cross-section
      aspect: area
      unit: um2
      aggregation_type: instance

    - label: fiber cross section diameter um
      domain: fiber-cross-section
      aspect: diameter
      unit: micrometer
      aggregation_type: instance

    - label: fiber cross section diameter um min
      domain: fiber-cross-section
      aspect: diameter
      unit: micrometer
      aggregation_type: min

    - label: fiber cross section diameter um max
      domain: fiber-cross-section
      aspect: diameter
      unit: micrometer
      aggregation_type: max

    # Fascicle measurements
    - label: fascicle cross section area um2
      domain: fascicle-cross-section
      aspect: area
      unit: um2
      aggregation_type: instance

    - label: fascicle cross section diameter um
      domain: fascicle-cross-section
      aspect: diameter
      unit: micrometer
      aggregation_type: instance

    - label: fascicle cross section diameter um min
      domain: fascicle-cross-section
      aspect: diameter
      unit: micrometer
      aggregation_type: min

    - label: fascicle cross section diameter um max
      domain: fascicle-cross-section
      aspect: diameter
      unit: micrometer
      aggregation_type: max

    # Fiber counts in fascicle
    - label: fiber count in fascicle cross section
      domain: fascicle-cross-section
      aspect: count-fiber
      unit: count
      aggregation_type: summary

    - label: nav fiber count in fascicle cross section estimated
      domain: fascicle-cross-section
      aspect: count-fiber-nav
      unit: count
      aggregation_type: summary

    - label: fiber count in fascicle cross section estimated
      domain: fascicle-cross-section
      aspect: count-estimated-fiber
      unit: count
      aggregation_type: summary

    # Fiber type counts
    - label: alpha a fiber count in fascicle cross section
      domain: fascicle-cross-section
      aspect: count-fiber-a-alpha
      unit: count
      aggregation_type: summary

    - label: beta a fiber count in fascicle cross section
      domain: fascicle-cross-section
      aspect: count-fiber-a-beta
      unit: count
      aggregation_type: summary

    - label: gamma a fiber count in fascicle cross section
      domain: fascicle-cross-section
      aspect: count-fiber-a-gamma
      unit: count
      aggregation_type: summary

    - label: delta a fiber count in fascicle cross section
      domain: fascicle-cross-section
      aspect: count-fiber-a-delta
      unit: count
      aggregation_type: summary

    - label: b fiber count in fascicle cross section
      domain: fascicle-cross-section
      aspect: count-fiber-b
      unit: count
      aggregation_type: summary

    - label: unmyelinated fiber count in fascicle cross section
      domain: fascicle-cross-section
      aspect: count-fiber-unmyelinated
      unit: count
      aggregation_type: summary

    - label: nav fiber count in fascicle cross section
      domain: fascicle-cross-section
      aspect: count-fiber-nav
      unit: count
      aggregation_type: summary

    - label: chat fiber count in fascicle cross section
      domain: fascicle-cross-section
      aspect: count-fiber-chat
      unit: count
      aggregation_type: summary

    - label: myelinated fiber count in fascicle cross section
      domain: fascicle-cross-section
      aspect: count-fiber-myelinated
      unit: count
      aggregation_type: summary

    # Fiber type areas
    - label: alpha a fiber area in fascicle cross section um2
      domain: fascicle-cross-section
      aspect: area-fiber-a-alpha
      unit: um2
      aggregation_type: summary

    - label: beta a fiber area in fascicle cross section um2
      domain: fascicle-cross-section
      aspect: area-fiber-a-beta
      unit: um2
      aggregation_type: summary

    - label: gamma a fiber area in fascicle cross section um2
      domain: fascicle-cross-section
      aspect: area-fiber-a-gamma
      unit: um2
      aggregation_type: summary

    - label: delta a fiber area in fascicle cross section um2
      domain: fascicle-cross-section
      aspect: area-fiber-a-delta
      unit: um2
      aggregation_type: summary

    - label: b fiber area in fascicle cross section um2
      domain: fascicle-cross-section
      aspect: area-fiber-b
      unit: um2
      aggregation_type: summary

    - label: unmyelinated fiber area in fascicle cross section um2
      domain: fascicle-cross-section
      aspect: area-fiber-unmyelinated
      unit: um2
      aggregation_type: summary

    - label: nav fiber area in fascicle cross section um2
      domain: fascicle-cross-section
      aspect: area-fiber-nav
      unit: um2
      aggregation_type: summary

    - label: chat fiber area in fascicle cross section um2
      domain: fascicle-cross-section
      aspect: area-fiber-chat
      unit: um2
      aggregation_type: summary

    - label: myelinated fiber area in fascicle cross section um2
      domain: fascicle-cross-section
      aspect: area-fiber-myelinated
      unit: um2
      aggregation_type: summary

    # Position measurements
    - label: fiber centroid x position um
      domain: fiber-cross-section
      aspect: centroid-x
      unit: micrometer
      aggregation_type: instance

    - label: fiber centroid y position um
      domain: fiber-cross-section
      aspect: centroid-y
      unit: micrometer
      aggregation_type: instance

    - label: fascicle centroid x position um
      domain: fascicle-cross-section
      aspect: centroid-x
      unit: micrometer
      aggregation_type: instance

    - label: fascicle centroid y position um
      domain: fascicle-cross-section
      aspect: centroid-y
      unit: micrometer
      aggregation_type: instance

    - label: fiber radius from fascicle centroid um
      domain: fiber-cross-section
      aspect: radius-from-parent-centroid
      unit: micrometer
      aggregation_type: instance

    - label: fiber angle from fascicle centroid radians
      domain: fiber-cross-section
      aspect: angle-from-parent-centroid
      unit: dimensionless
      aggregation_type: instance

  categorical:
    # Fiber classification descriptors
    - label: fiber type classification
      domain: nerve-fiber
      range: controlled

    - label: myelin status
      domain: nerve-fiber
      range: controlled

    - label: marker expression
      domain: nerve-fiber
      range: controlled

