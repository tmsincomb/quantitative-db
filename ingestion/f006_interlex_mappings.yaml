# F006 file type to processing mappings
file_types:
  "text/csv": "measurement_data"

# Object descriptor mappings for F006 CSV files
object_mappings:
  measurement_data:
    instance_mappings:
      - descriptor: nerve-cross-section
        address: constant
      - descriptor: fascicle-cross-section
        address: constant
      - descriptor: fiber-cross-section
        address: constant

    quantitative_mappings:
      # Fascicle measurements
      - descriptor: fascicle cross section area um2
        address: fascicle_area
      - descriptor: fascicle cross section diameter um
        address: fascicle_eff_diam
      - descriptor: fascicle cross section diameter um min
        address: fascicle_shortest_diameter
      - descriptor: fascicle cross section diameter um max
        address: fascicle_longest_diameter
      - descriptor: fascicle centroid x position um
        address: fascicle_x_cent
      - descriptor: fascicle centroid y position um
        address: fascicle_y_cent

      # Fiber counts
      - descriptor: alpha a fiber count in fascicle cross section
        address: n_a_alpha
      - descriptor: beta a fiber count in fascicle cross section
        address: n_a_beta
      - descriptor: gamma a fiber count in fascicle cross section
        address: n_a_gamma
      - descriptor: delta a fiber count in fascicle cross section
        address: n_a_delta
      - descriptor: b fiber count in fascicle cross section
        address: n_b
      - descriptor: unmyelinated fiber count in fascicle cross section
        address: n_unmyel_nf
      - descriptor: nav fiber count in fascicle cross section
        address: n_nav
      - descriptor: chat fiber count in fascicle cross section
        address: n_chat
      - descriptor: myelinated fiber count in fascicle cross section
        address: n_myelinated

      # Fiber areas
      - descriptor: alpha a fiber area in fascicle cross section um2
        address: area_a_alpha
      - descriptor: beta a fiber area in fascicle cross section um2
        address: area_a_beta
      - descriptor: gamma a fiber area in fascicle cross section um2
        address: area_a_gamma
      - descriptor: delta a fiber area in fascicle cross section um2
        address: area_a_delta
      - descriptor: b fiber area in fascicle cross section um2
        address: area_b
      - descriptor: unmyelinated fiber area in fascicle cross section um2
        address: area_unmyel_nf
      - descriptor: nav fiber area in fascicle cross section um2
        address: area_nav
      - descriptor: chat fiber area in fascicle cross section um2
        address: area_chat
      - descriptor: myelinated fiber area in fascicle cross section um2
        address: area_myelinated

      # Individual fiber measurements (if processing fiber CSV)
      - descriptor: fiber cross section area um2
        address: fiber_area
      - descriptor: fiber cross section diameter um
        address: fiber_eff_diam
      - descriptor: fiber cross section diameter um min
        address: fiber_shortest_diameter
      - descriptor: fiber cross section diameter um max
        address: fiber_longest_diameter
      - descriptor: fiber centroid x position um
        address: fiber_x
      - descriptor: fiber centroid y position um
        address: fiber_y
      - descriptor: fiber radius from fascicle centroid um
        address: fiber_rho
      - descriptor: fiber angle from fascicle centroid radians
        address: fiber_phi

# Controlled terms for F006
controlled_terms:
  # Fiber types
  - iri: http://uri.interlex.org/ilx_0739400
    label: a-alpha-fiber
  - iri: http://uri.interlex.org/ilx_0739401
    label: a-beta-fiber
  - iri: http://uri.interlex.org/ilx_0739402
    label: a-gamma-fiber
  - iri: http://uri.interlex.org/ilx_0739403
    label: a-delta-fiber
  - iri: http://uri.interlex.org/ilx_0739404
    label: b-fiber
  - iri: http://uri.interlex.org/ilx_0739405
    label: c-fiber

  # Myelin status
  - iri: http://uri.interlex.org/ilx_0739410
    label: myelinated
  - iri: http://uri.interlex.org/ilx_0739411
    label: unmyelinated

  # Marker expression
  - iri: http://uri.interlex.org/ilx_0739420
