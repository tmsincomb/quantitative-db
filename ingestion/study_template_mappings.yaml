  subject_type: human
  sample_type: nerve-volume
  site_type: extruded-plane
  scaffold_type: scaffold
  fiber_type: nerve-fiber
  fascicle_type: nerve-fascicle

# Common file type mappings
file_types:
  "image/tiff": "microscopy_image"
  "image/png": "microscopy_image"
  "image/jpeg": "microscopy_image"
  "text/csv": "tabular_data"
  "application/vnd.ms-excel": "tabular_data"
  "application/vnd.openxmlformats-officedocument.spreadsheetml.sheet": "tabular_data"
  "application/x-matlab-data": "matlab_data"
  "application/json": "metadata"
  "text/plain": "text_data"
  "application/pdf": "document"
  "application/x-hdf": "binary_data"
  "application/octet-stream": "binary_data"

# Common address types
address_types:
  constant:
    addr_type: constant
    addr_field: null
    value_type: single

  tabular_header:
    addr_type: tabular-header
    value_type: single

  tabular_row_column:
    addr_type: tabular-row-column
    value_type: single

  json_path:
    addr_type: json-path
    value_type: single

  xpath:
    addr_type: xpath
    value_type: single

  hdf5_dataset:
    addr_type: hdf5-dataset
    value_type: array
